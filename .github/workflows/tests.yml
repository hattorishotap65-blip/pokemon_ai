name: Run Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Level 7 tools tests
        run: python experiments/test_level7_tools.py

      - name: Run effect engine tests
        run: python experiments/test_effect_engine.py

      - name: Run turn rule engine tests
        run: python experiments/test_turn_rule_engine.py

      - name: Run Voltorb attack tests
        run: python experiments/test_voltorb_attack.py

      - name: Run Kilowattrel ability tests
        run: python experiments/test_kilowattrel_ability.py

      - name: Run search history tests
        run: python experiments/test_search_history.py

      - name: Run promotion gate tests
        run: python experiments/test_promotion_gate.py

      - name: Run auto tune tests
        run: python experiments/test_auto_tune.py

      - name: Run weight search defaults tests
        run: python experiments/test_weight_search_defaults.py

      - name: Run auto tune runner tests
        run: python experiments/test_auto_tune_runner.py

      - name: Run bench liability tests
        run: python experiments/test_bench_liability.py

      - name: Run card metadata tests
        run: python experiments/test_card_metadata.py

      - name: Run damage predictor tests
        run: python experiments/test_damage_predictor.py

      - name: Run alternative attacker tests
        run: python experiments/test_alternative_attacker.py

      - name: Run boss targeting tests
        run: python experiments/test_boss_targeting.py

      - name: Run energy readiness tests
        run: python experiments/test_energy_readiness.py

      - name: Run bellibolt ability timing tests
        run: python experiments/test_bellibolt_ability_timing.py

      - name: Run params loader tests
        run: python experiments/test_params.py

      - name: Run core param search tests
        run: python experiments/test_core_param_search.py

      - name: Run attack plan tests
        run: python experiments/test_attack_plan.py

      - name: Run ML features tests
        run: python experiments/test_ml_features.py

      - name: Run ML policy tests
        run: python experiments/test_ml_policy.py

      - name: Run ML training logger tests
        run: python experiments/test_ml_training_logger.py

      - name: Run ML training tests
        run: python experiments/test_ml_training.py

      - name: Run ML weight evaluation tests
        run: python experiments/test_ml_weight_evaluation.py

      - name: Run ML weight search tests
        run: python experiments/test_ml_weight_search.py

      - name: Run attack plan diagnostics tests
        run: python experiments/test_attack_plan_diagnostics.py
