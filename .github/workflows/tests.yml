name: Run Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Level 7 tools tests
        run: python experiments/test_level7_tools.py

      - name: Run effect engine tests
        run: python experiments/test_effect_engine.py

      - name: Run turn rule engine tests
        run: python experiments/test_turn_rule_engine.py

      - name: Run Voltorb attack tests
        run: python experiments/test_voltorb_attack.py

      - name: Run Kilowattrel ability tests
        run: python experiments/test_kilowattrel_ability.py

      - name: Run search history tests
        run: python experiments/test_search_history.py

      - name: Run promotion gate tests
        run: python experiments/test_promotion_gate.py

      - name: Run auto tune tests
        run: python experiments/test_auto_tune.py

      - name: Run weight search defaults tests
        run: python experiments/test_weight_search_defaults.py

      - name: Run auto tune runner tests
        run: python experiments/test_auto_tune_runner.py

      - name: Run bench liability tests
        run: python experiments/test_bench_liability.py

      - name: Run card metadata tests
        run: python experiments/test_card_metadata.py

      - name: Run damage predictor tests
        run: python experiments/test_damage_predictor.py

      - name: Run alternative attacker tests
        run: python experiments/test_alternative_attacker.py

      - name: Run boss targeting tests
        run: python experiments/test_boss_targeting.py

      - name: Run energy readiness tests
        run: python experiments/test_energy_readiness.py

      - name: Run bellibolt ability timing tests
        run: python experiments/test_bellibolt_ability_timing.py

      - name: Run params loader tests
        run: python experiments/test_params.py

      - name: Run core param search tests
        run: python experiments/test_core_param_search.py

      - name: Run attack plan tests
        run: python experiments/test_attack_plan.py

      - name: Run ML features tests
        run: python experiments/test_ml_features.py

      - name: Run ML policy tests
        run: python experiments/test_ml_policy.py

      - name: Run ML training logger tests
        run: python experiments/test_ml_training_logger.py

      - name: Run ML training tests
        run: python experiments/test_ml_training.py

      - name: Run ML weight evaluation tests
        run: python experiments/test_ml_weight_evaluation.py

      - name: Run ML weight search tests
        run: python experiments/test_ml_weight_search.py

      - name: Run attack plan diagnostics tests
        run: python experiments/test_attack_plan_diagnostics.py

      - name: Run collect attack plan diagnostics tests
        run: python experiments/test_collect_attack_plan_diagnostics.py

      - name: Run learning schema tests
        run: python experiments/test_learning_schema.py

      - name: Run learning action features tests
        run: python experiments/test_learning_action_features.py

      - name: Run learning evaluator tests
        run: python experiments/test_learning_evaluator.py

      - name: Run learning train tests
        run: python experiments/test_learning_train.py

      - name: Run learning report tests
        run: python experiments/test_learning_report.py

      - name: Run learning weight profile tests
        run: python experiments/test_learning_weight_profile.py

      - name: Run learning agent action adapter tests
        run: python experiments/test_learning_agent_action_adapter.py

      - name: Run learning decision advisor tests
        run: python experiments/test_learning_decision_advisor.py

      - name: Run learning runtime advisor hook tests
        run: python experiments/test_learning_runtime_advisor_hook.py

      - name: Run learning runtime candidate builder tests
        run: python experiments/test_learning_runtime_candidate_builder.py

      - name: Run learning runtime trace tests
        run: python experiments/test_learning_runtime_trace.py

      - name: Run cabt runner scripts tests
        run: python experiments/test_cabt_runner_scripts.py

      - name: Run learning cabt trace eval runner tests
        run: python experiments/test_learning_cabt_trace_eval_runner.py

      - name: Run web deck registry tests
        run: python experiments/test_web_deck_registry.py

      - name: Run raging bolt agent tests
        run: python experiments/test_raging_bolt_agent.py

      - name: Run human trace tests
        run: python experiments/test_human_trace.py

      - name: Run strategy trace analyzer tests
        run: python experiments/test_human_trace_strategy_analysis.py

      - name: Run learning trace analyzer tests
        run: python experiments/test_learning_trace_analyzer.py

      - name: Run learning trace recommender tests
        run: python experiments/test_learning_trace_recommender.py

      - name: Run advise_action CLI smoke test
        run: python experiments/learning/advise_action.py --logs experiments/learning/sample_logs/raging_ogerpon_sample.jsonl --weights experiments/learning/params/raging_ogerpon_default.json --show-mismatches 1
