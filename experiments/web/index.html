<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PTCG バトルサンドボックス</title>
<style>
:root{
  --grass:#78c850;--fire:#f08030;--water:#6890f0;--lightning:#f8d030;--psychic:#f85888;
  --fighting:#c03028;--darkness:#705848;--metal:#b8b8d0;--dragon:#7038f8;--fairy:#ee99ac;--colorless:#a8a878;
  --bg-dark:#0f1923;--bg-mid:#1a2735;--bg-card:#232f3e;
  --accent:#4fc3f7;--accent2:#ff6b6b;--gold:#ffd700;
  --text:#e8eef3;--text-dim:#9fb0bd;--border:#2d3e50;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,"Hiragino Sans","Meiryo",sans-serif;font-size:16px;
  background:linear-gradient(160deg,var(--bg-dark),#0a0e14);color:var(--text);min-height:100vh}
header{display:flex;gap:14px;align-items:center;padding:14px 22px;border-bottom:2px solid var(--accent);
  background:linear-gradient(90deg,rgba(79,195,247,.12),rgba(255,215,0,.06));position:sticky;top:0;z-index:20;flex-wrap:wrap}
header .title{font-weight:800;font-size:20px;background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.hint{font-size:14px;color:var(--text-dim)}
.btn{cursor:pointer;border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:15px;background:var(--bg-card);color:var(--text);transition:.15s}
.btn:hover{background:var(--accent);color:#000;border-color:var(--accent);transform:translateY(-1px)}
select{padding:9px 12px;border-radius:8px;background:var(--bg-card);color:var(--text);border:1px solid var(--border);font-size:15px}
#wrap{display:grid;grid-template-columns:1fr 400px;gap:18px;padding:18px;max-width:1340px;margin:0 auto}
@media(max-width:1000px){#wrap{grid-template-columns:1fr}}

.board{display:flex;flex-direction:column;gap:12px}
.player-zone{border-radius:16px;padding:16px;border:1px solid var(--border);background:var(--bg-mid);transition:.3s}
.player-zone.opponent{border-top:3px solid rgba(240,128,48,.4)}
.player-zone.me{border-bottom:3px solid rgba(79,195,247,.4)}
.player-zone.active-turn{border-color:var(--accent2);box-shadow:0 0 26px rgba(255,107,107,.12)}
.player-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.player-name{display:flex;align-items:center;gap:8px;font-weight:700;font-size:17px}
.player-name .dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
.opponent .player-name .dot{background:var(--fire)}
.turn-indicator{font-size:13px;background:var(--accent2);color:#fff;padding:3px 10px;border-radius:10px;display:none}
.active-turn .turn-indicator{display:inline-block}
.zone-stats{display:flex;gap:10px;font-size:14px;color:var(--text-dim);flex-wrap:wrap}
.zone-stat{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.3);padding:5px 12px;border-radius:6px}
.zone-stat .val{font-weight:700;color:var(--text);font-size:15px}
.prize-dots{display:inline-flex;gap:3px;margin-left:5px}
.prize-dots i{width:11px;height:11px;border-radius:2px;background:var(--gold);display:inline-block}
.prize-dots i.taken{background:rgba(255,255,255,.13)}

/* real-board layout: actives meet in the centre, benches on the outer edge */
.field{display:flex;flex-direction:column;align-items:center;gap:10px}
.row-label{font-size:12px;color:var(--text-dim);letter-spacing:1px;font-weight:700;align-self:flex-start}
.active-row{display:flex;justify-content:center;min-height:60px}
.bench-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-height:56px}

.card{position:relative;width:150px;background:var(--bg-card);border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s}
.card:hover{transform:translateY(-3px);border-color:var(--accent)}
.card.active{border-color:var(--gold);box-shadow:0 0 14px rgba(255,215,0,.2)}
.card.small{width:118px}
.card-type-bar{height:7px;width:100%}
.card-body{padding:8px 10px}
.card-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.small .card-name{font-size:13px}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-top:3px}
.hp-text{font-size:14px;font-weight:700}
.hp-text .max{color:var(--text-dim);font-weight:400}
.ex-badge{background:var(--gold);color:#000;border-radius:4px;padding:0 5px;font-weight:800;font-size:11px}
.hp-bar{height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;margin:5px 0 3px}
.hp-bar-fill{height:100%;border-radius:3px}
.hp-bar-fill.high{background:linear-gradient(90deg,#4caf50,#66bb6a)}
.hp-bar-fill.mid{background:linear-gradient(90deg,#ff9800,#ffa726)}
.hp-bar-fill.low{background:linear-gradient(90deg,#f44336,#ef5350)}
.energy-row{font-size:14px;color:var(--text-dim)}
.empty-slot{width:118px;height:60px;border:1px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:13px}

/* card-image layer (loaded from public CDN at runtime; falls back to text card) */
.card.imgc{aspect-ratio:5/7}                 /* real TCG card ratio (63×88mm) */
.card.imgc.noimg{aspect-ratio:auto}          /* text fallback shrinks to content */
/* the text card stays visible as a placeholder; the image overlays it once loaded
   (transparent until then, so a slow/failed image never shows a blank card) */
.cimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:transparent}
.card.imgc.noimg .cimg,.card.imgc.noimg .ovl{display:none}
.ovl{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:5px 7px;
  background:linear-gradient(transparent,rgba(0,0,0,.55),rgba(0,0,0,.9));border-radius:0 0 8px 8px}
.ovl .nm{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.small .ovl .nm{font-size:11px}
.ovl .meta{display:flex;justify-content:space-between;font-size:13px;color:#fff;margin-top:2px}

.center-area{display:flex;justify-content:center;align-items:center;gap:16px;padding:6px}
.stadium-card{font-size:14px;padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,.25);color:var(--text-dim)}
.turn-badge{font-size:15px;font-weight:700;padding:5px 16px;border-radius:20px;background:rgba(79,195,247,.15);border:1px solid var(--accent)}
.hand-strip{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;border-top:1px solid var(--border);padding-top:12px}
.hand-card{position:relative;width:64px;aspect-ratio:5/7;border-radius:5px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);transition:.12s}
.hand-card:hover{transform:translateY(-5px);border-color:var(--accent);z-index:3}
.hand-card img{width:100%;height:100%;object-fit:cover;display:block}
.hand-card .hc-nm{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;font-size:9px;padding:2px;color:var(--text);line-height:1.15}
.hand-card.noimg img{display:none}
.hand-card.noimg .hc-nm{display:flex}

.sidepanel{background:var(--bg-mid);border:1px solid var(--border);border-radius:16px;padding:18px;align-self:start;position:sticky;top:84px}
.result{font-size:22px;font-weight:800;text-align:center;padding:16px;background:var(--bg-card);border-radius:10px;margin-bottom:12px}
.ctx{font-size:18px;font-weight:700;margin:4px 0 10px}
.aihint{font-size:15px;background:rgba(79,195,247,.1);border:1px solid var(--accent);border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.5}
.opt{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;margin-bottom:7px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:11px 13px;cursor:pointer;transition:.12s;font-size:15.5px}
.opt:hover{border-color:var(--accent)}
.opt.rec{background:rgba(90,209,122,.14);border-color:#5ad17a}
.opt.sel{outline:2px solid var(--gold)}
.opt .sc{font-size:14px;color:var(--text-dim);font-variant-numeric:tabular-nums;font-weight:700}
.tag{font-size:11px;background:#5ad17a;color:#06210f;border-radius:5px;padding:2px 7px;margin-left:6px;font-weight:700}
.barwrap{flex:1;margin:0 8px;height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;min-width:30px}
.barwrap i{display:block;height:100%;background:var(--accent)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:50}
.modal-overlay.show{display:flex}
.card-detail{background:var(--bg-mid);border:1px solid var(--accent);border-radius:14px;max-width:460px;width:92%;max-height:84vh;overflow:auto;padding:20px;display:flex;gap:16px;flex-direction:column}
.detail-top{display:flex;gap:14px}
.detail-top img{width:150px;border-radius:8px;flex:0 0 auto}
.detail-row{display:flex;justify-content:space-between;font-size:15px;padding:5px 0;border-bottom:1px solid var(--border)}
.detail-row .label{color:var(--text-dim)}
.atk{background:rgba(0,0,0,.25);border-radius:8px;padding:10px 12px;margin-top:8px}
.atk .nm{font-weight:700;font-size:15px;display:flex;justify-content:space-between;gap:8px}
.atk .tx{font-size:14px;color:var(--text-dim);margin-top:4px;line-height:1.45}
.type-badge{font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px;color:#000}

/* deck/discard pile anchors */
.piles{display:flex;gap:8px}
.pile{font-size:12px;color:var(--text-dim);background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:4px 9px;text-align:center;line-height:1.2}
.pile b{display:block;font-size:15px;color:var(--text)}

/* event log panel (like the official visualizer) */
.logpanel{margin-top:14px;border-top:1px solid var(--border);padding-top:10px}
.logpanel h4{margin:0 0 6px;font-size:14px;color:var(--text-dim);letter-spacing:1px}
.logbox{max-height:300px;overflow:auto;display:flex;flex-direction:column;gap:2px;font-size:13px}
.log-entry{padding:3px 8px;border-radius:5px;line-height:1.35}
.log-entry.me{background:rgba(79,195,247,.10)}
.log-entry.opp{background:rgba(240,128,48,.10)}
.log-entry.hd{font-weight:800;text-align:center;background:rgba(255,215,0,.12);color:var(--gold);margin:3px 0}

/* fly animation (card moving between zones) */
.fly{position:fixed;width:56px;aspect-ratio:5/7;z-index:60;border-radius:5px;overflow:hidden;
  background:var(--bg-card);border:1px solid var(--accent);box-shadow:0 6px 20px rgba(0,0,0,.5);
  pointer-events:none;transition:left .6s ease,top .6s ease,opacity .6s ease,transform .6s ease}
.fly img{width:100%;height:100%;object-fit:cover}
.fly .fl{font-size:10px;color:#fff;text-align:center;padding-top:6px}

/* card-reveal overlay (when a card is used / evolved / attacks) */
.reveal{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%) scale(.6);z-index:65;
  width:180px;aspect-ratio:5/7;border-radius:12px;overflow:hidden;box-shadow:0 10px 50px rgba(0,0,0,.7);
  border:2px solid var(--gold);opacity:0;transition:all .35s cubic-bezier(.2,1.4,.4,1);pointer-events:none}
.reveal.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.reveal img{width:100%;height:100%;object-fit:cover}
.reveal .rl{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);color:#fff;text-align:center;padding:5px;font-weight:700;font-size:14px}

/* strategy thought panel (recording mode) */
.thought-panel{display:none;margin-bottom:12px;border:1px solid var(--accent2);border-radius:10px;padding:12px;background:rgba(255,107,107,.06)}
.thought-panel.show{display:block}
.thought-panel h4{margin:0 0 8px;font-size:14px;color:var(--accent2);letter-spacing:.5px}
.tp-section{margin-bottom:10px}
.tp-label{font-size:12px;color:var(--text-dim);margin-bottom:4px;font-weight:700}
.tp-chips{display:flex;flex-wrap:wrap;gap:4px}
.tp-chip{font-size:12px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--bg-card);
  color:var(--text-dim);cursor:pointer;transition:.12s;user-select:none}
.tp-chip:hover{border-color:var(--accent)}
.tp-chip.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.tp-chip.goal{border-radius:8px}
.tp-chip.goal.on{background:var(--accent);color:#000;border-color:var(--accent)}
/* considered checkbox */
.opt .cbox{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
/* reason tags under options */
.reason-area{display:none;margin:8px 0 4px;padding:8px;border:1px dashed var(--border);border-radius:8px}
.reason-area.show{display:block}
.reason-area .tp-label{margin-bottom:4px}
</style>
</head>
<body>
<header>
  <span class="title">🃏 PTCG バトルサンドボックス</span>
  <span class="hint">右パネルにAIの推奨手とスコアを表示。カードをクリックで詳細。</span>
  <span style="flex:1"></span>
  <span class="hint">あなたのデッキ</span>
  <select id="me"></select>
  <span class="hint">対戦相手</span>
  <select id="opp"></select>
  <button class="btn" onclick="newGame()">🔄 新しい対戦</button>
  <button class="btn" id="recBtn" onclick="toggleRec()" style="min-width:90px">⏺ 記録OFF</button>
  <a class="btn" href="/deck" target="_blank" style="text-decoration:none">📖 デッキ図鑑</a>
</header>

<div id="wrap">
  <div class="board">
    <div class="player-zone opponent" id="oppZone">
      <div class="player-header">
        <div class="player-name"><span class="dot"></span><span id="oppName">CPU</span><span class="turn-indicator">アクション中</span></div>
        <div class="zone-stats" id="oppStats"></div>
        <div class="piles"><div class="pile" id="opp-deck">山札<b>–</b></div><div class="pile" id="opp-discard">トラッシュ<b>–</b></div></div>
      </div>
      <div class="field">
        <div class="row-label">ベンチ BENCH</div>
        <div class="bench-row" id="oppBench"></div>
        <div class="row-label">バトル場 ACTIVE</div>
        <div class="active-row" id="oppActive"></div>
      </div>
    </div>
    <div class="center-area">
      <div class="stadium-card" id="stadium">スタジアムなし</div>
      <div class="turn-badge" id="turnBadge">ターン –</div>
    </div>
    <div class="player-zone me" id="meZone">
      <div class="player-header">
        <div class="player-name"><span class="dot"></span><span id="meName">你</span><span class="turn-indicator">アクション中</span></div>
        <div class="zone-stats" id="meStats"></div>
        <div class="piles"><div class="pile" id="me-deck">山札<b>–</b></div><div class="pile" id="me-discard">トラッシュ<b>–</b></div></div>
      </div>
      <div class="field">
        <div class="row-label">バトル場 ACTIVE</div>
        <div class="active-row" id="meActive"></div>
        <div class="row-label">ベンチ BENCH</div>
        <div class="bench-row" id="meBench"></div>
      </div>
      <div class="hand-strip" id="hand"></div>
    </div>
  </div>

  <div class="sidepanel">
    <div class="result" id="result" style="display:none"></div>
    <div class="ctx" id="ctx">「新しい対戦」を押して開始</div>
    <div class="thought-panel" id="thoughtPanel">
      <h4>🧠 ターン思考 (記録用)</h4>
      <div class="tp-section">
        <div class="tp-label">このターンの目標</div>
        <div class="tp-chips" id="goalChips"></div>
      </div>
      <div class="tp-section">
        <div class="tp-label">勝ち筋プラン</div>
        <div class="tp-chips" id="winPlanChips"></div>
      </div>
      <div class="tp-section">
        <div class="tp-label">リスク</div>
        <div class="tp-chips" id="riskChips"></div>
      </div>
    </div>
    <div class="aihint" id="aihint" style="display:none"></div>
    <div id="options"></div>
    <div class="reason-area" id="reasonArea">
      <div class="tp-label">行動理由</div>
      <div class="tp-chips" id="reasonChips"></div>
    </div>
    <button class="btn" id="confirm" style="display:none;width:100%;margin-top:8px;background:var(--gold);color:#000;font-weight:700;font-size:16px" onclick="confirmMulti()">決定する</button>
    <div class="logpanel"><h4>📜 対戦ログ</h4><div class="logbox" id="logbox"></div></div>
  </div>
</div>
<div class="reveal" id="reveal"></div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="card-detail" id="modalBody"></div>
</div>

<script>
let STATE=null, SEL=[], MULTI=false, DB={}, IMG={}, LASTSEQ=-1, REC=false;
let TURN_GOAL='', WIN_PLAN=new Set(), RISKS=new Set(), REASONS=new Set(), CONSIDERED=new Set();
const $=s=>document.querySelector(s);

const GOALS=[
  ['setup_board','盤面展開'],['prepare_next_turn_attack','次ターン攻撃準備'],
  ['take_ko_now','今KOを狙う'],['take_two_prizes','サイド2枚取り'],
  ['close_game','勝ち切り'],['prevent_loss','負け筋を消す'],
  ['improve_hand','手札を整える'],['preserve_resources','リソース温存'],
  ['disrupt_opponent','相手妨害']
];
const WIN_PLANS=[
  ['ko_active','バトル場KO'],['boss_two_prize_target','ボスで2枚取り'],
  ['raging_bolt_big_damage_next_turn','次ターン高火力'],['ogerpon_energy_engine','オーガポンエネ加速'],
  ['remove_main_attacker','主力除去'],['win_by_prize_race','サイドレース勝ち'],
  ['win_by_resource','リソース差勝ち'],['win_by_deck_out_avoidance','山切れ回避']
];
const RISK_FLAGS=[
  ['active_may_be_ko_next_turn','次ターンKOされそう'],['no_next_attacker','次アタッカーなし'],
  ['not_enough_energy','エネ不足'],['low_hand','手札弱い'],['low_deck','山札少ない'],
  ['boss_needed_for_win','ボス温存したい'],['bench_liability','ベンチ負け筋'],['behind_prize_race','サイド遅れ']
];
const REASON_TAGS=[
  ['take_ko_now','今KO'],['take_two_prizes','2枚取り'],['prepare_next_turn_attack','次ターン準備'],
  ['build_raging_bolt_damage','タケルライコ火力準備'],['prioritize_energy_acceleration','エネ加速優先'],
  ['improve_hand','手札改善'],['avoid_bad_hand','事故回避'],['preserve_resources','リソース温存'],
  ['avoid_deck_out','山切れ回避'],['gust_win_condition','ボス勝ち筋'],['disrupt_opponent','妨害'],
  ['setup_board','盤面整備'],['retreat_or_switch_safety','入替安全'],['other','その他']
];
const TYPES={GRASS:'--grass',FIRE:'--fire',WATER:'--water',LIGHTNING:'--lightning',PSYCHIC:'--psychic',
  FIGHTING:'--fighting',DARKNESS:'--darkness',METAL:'--metal',DRAGON:'--dragon',FAIRY:'--fairy',COLORLESS:'--colorless'};
const TC={GRASS:'草',FIRE:'炎',WATER:'水',LIGHTNING:'雷',PSYCHIC:'超',FIGHTING:'闘',DARKNESS:'悪',METAL:'鋼',DRAGON:'竜',FAIRY:'妖',COLORLESS:'無'};
const tColor=t=>`var(${TYPES[t]||'--colorless'})`;
const short=n=>(n||'').replace("Ethan's ","").replace("Iono's ","");
const imgURL=id=>{const slug=IMG[String(id)]; return slug?`https://images.pokemontcg.io/${slug}_hires.png`:`/card_img/${id}.png`;};

function cardHTML(p,active){
  if(!p) return active?'<div class="empty-slot">—</div>':'';
  const d=DB[p.id]||{}; const c=tColor(d.type);
  const pct=Math.max(0,Math.min(100,Math.round(100*p.hp/(p.maxHp||p.hp||1))));
  const cls=pct>50?'high':pct>20?'mid':'low';
  const ex=d.ex?'<span class="ex-badge">ex</span>':'';
  const tools=(p.tools&&p.tools.length)?` 🛡${p.tools.length}`:'';
  const body=`<div class="card-type-bar" style="background:${c}"></div>
    <div class="card-body">
      <div class="card-name">${short(p.name)} ${ex}</div>
      <div class="hp-bar"><div class="hp-bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="card-row"><span class="hp-text">${p.hp}<span class="max">/${p.maxHp}</span></span>
        <span class="energy-row">🔋${p.energy}${tools}</span></div>
    </div>`;
  const url=imgURL(p.id);
  const imgLayer = url ? `<img class="cimg" src="${url}" onerror="this.closest('.card').classList.add('noimg')">
    <div class="ovl"><div class="nm">${short(p.name)} ${ex}</div>
      <div class="hp-bar"><div class="hp-bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="meta"><span>${p.hp}/${p.maxHp}</span><span>🔋${p.energy}${tools}</span></div></div>` : '';
  return `<div class="card ${active?'active small':'small'} ${url?'imgc':''}" data-id="${p.id}"
    data-hp="${p.hp}" data-mhp="${p.maxHp}" data-e="${p.energy}" data-tools="${(p.tools||[]).join('、')}"
    onclick="detailLive(this)">${body}${imgLayer}</div>`;
}
function handHTML(c){
  const url=imgURL(c.id);
  const nm=`<div class="hc-nm">${short(c.name)}</div>`;
  if(url) return `<div class="hand-card" onclick="detail(${c.id})"><img src="${url}" onerror="this.closest('.hand-card').classList.add('noimg')">${nm}</div>`;
  return `<div class="hand-card noimg" onclick="detail(${c.id})">${nm}</div>`;
}
function statHTML(o,isOpp){
  const taken=6-o.prizes; let dots='<span class="prize-dots">';
  for(let i=0;i<6;i++) dots+=`<i class="${i<taken?'taken':''}"></i>`;
  dots+='</span>';
  const hand=isOpp?o.handCount:(o.hand?o.hand.length:0);
  return `<div class="zone-stat">サイド${dots}</div>
    <div class="zone-stat">✋ 手札 <span class="val">${hand}</span></div>
    <div class="zone-stat">📚 山札 <span class="val">${o.deck}</span></div>`;
}
function buildChips(container, items, selectedSet, isRadio, cls){
  container.innerHTML='';
  items.forEach(([key,label])=>{
    const c=document.createElement('span');
    c.className='tp-chip'+(cls?' '+cls:'')+(selectedSet.has?selectedSet.has(key)?(' on'):'':selectedSet===key?' on':'');
    if(isRadio) c.classList.toggle('on', selectedSet===key);
    else c.classList.toggle('on', selectedSet.has(key));
    c.textContent=label;
    c.onclick=()=>{
      if(isRadio){ TURN_GOAL=TURN_GOAL===key?'':key; buildChips(container,items,TURN_GOAL,true,cls); }
      else { selectedSet.has(key)?selectedSet.delete(key):selectedSet.add(key); c.classList.toggle('on'); }
    };
    container.appendChild(c);
  });
}
function renderThoughtPanel(show){
  const p=$('#thoughtPanel'); p.classList.toggle('show',show);
  const r=$('#reasonArea'); r.classList.toggle('show',show);
  if(show){
    buildChips($('#goalChips'), GOALS, TURN_GOAL, true, 'goal');
    buildChips($('#winPlanChips'), WIN_PLANS, WIN_PLAN, false, '');
    buildChips($('#riskChips'), RISK_FLAGS, RISKS, false, '');
    buildChips($('#reasonChips'), REASON_TAGS, REASONS, false, '');
  }
}
function render(s){
  STATE=s; SEL=[]; CONSIDERED=new Set();
  if(!s.started){ $('#ctx').textContent='「新しい対戦」を押して開始'; renderThoughtPanel(false); return; }
  $('#oppActive').innerHTML=cardHTML(s.opp.active,true);
  $('#oppBench').innerHTML=(s.opp.bench||[]).map(p=>cardHTML(p)).join('')||'<div class="empty-slot">空き</div>';
  $('#oppStats').innerHTML=statHTML(s.opp,true);
  $('#meActive').innerHTML=cardHTML(s.me.active,true);
  $('#meBench').innerHTML=(s.me.bench||[]).map(p=>cardHTML(p)).join('')||'<div class="empty-slot">空き</div>';
  $('#meStats').innerHTML=statHTML(s.me,false);
  $('#hand').innerHTML=(s.me.hand||[]).map(handHTML).join('');
  $('#stadium').textContent=s.stadium?('🏟 '+s.stadium):'スタジアムなし';
  $('#turnBadge').textContent='ターン '+(s.turn??'–');
  $('#oppZone').classList.toggle('active-turn', !s.over && !s.yourTurn);
  $('#meZone').classList.toggle('active-turn', !s.over && s.yourTurn);
  setPile('me',s.me); setPile('opp',s.opp);
  processLog(s.log||[]);
  $('#result').textContent=s.result||''; $('#result').style.display=s.result?'block':'none';
  $('#ctx').textContent = s.over?'対戦終了':(s.yourTurn?('あなたのターン · '+(s.context||'')):'CPU思考中…');
  const optDiv=$('#options'); optDiv.innerHTML=''; $('#confirm').style.display='none';
  if(s.over || !s.yourTurn){ $('#aihint').style.display='none'; renderThoughtPanel(false); return; }
  const showRec = REC && s.yourTurn && !s.over && !_SKIP_TAG_CTX.has(s.context);
  renderThoughtPanel(showRec);
  MULTI = s.multi && s.multi.max>1;
  const recs=(s.options||[]).filter(o=>o.recommended).map(o=>o.label).join(' + ');
  $('#aihint').style.display='block';
  $('#aihint').innerHTML=`🤖 <b>AI推奨:</b> ${recs||'(なし)'}${MULTI?`<br><span class="hint">${s.multi.min}〜${s.multi.max}個を選んで決定を押す</span>`:''}`;
  const mx=Math.max(1,...(s.options||[]).map(o=>o.score||0));
  (s.options||[]).forEach(o=>{
    const b=document.createElement('div');
    b.className='opt'+(o.recommended?' rec':'');
    const pct=Math.max(0,Math.round(100*(o.score||0)/mx));
    let cboxHtml='';
    if(showRec) cboxHtml=`<input type="checkbox" class="cbox" title="検討候補" onclick="event.stopPropagation();togCon(${o.i},this)">`;
    b.innerHTML=`${cboxHtml}<span>${o.label}${o.recommended?'<span class="tag">AI</span>':''}</span>
      <span class="barwrap"><i style="width:${pct}%"></i></span><span class="sc">${o.score}</span>`;
    b.onclick=()=>pick(o.i,b);
    optDiv.appendChild(b);
  });
  if(MULTI) $('#confirm').style.display='block';
}
function togCon(i,el){ if(el.checked) CONSIDERED.add(i); else CONSIDERED.delete(i); }
const _SKIP_TAG_CTX=new Set(['IS_FIRST','DRAW_COUNT','SETUP_ACTIVE_POKEMON','SETUP_BENCH_POKEMON','MULLIGAN']);
function _checkRecTags(){
  if(!REC) return true;
  if(STATE && _SKIP_TAG_CTX.has(STATE.context)) return true;
  if(REASONS.size===0){alert('「行動理由」を1つ以上選んでください');return false;}
  return true;
}
function pick(i,btn){
  if(MULTI){ const k=SEL.indexOf(i);
    if(k>=0){SEL.splice(k,1);btn.classList.remove('sel');} else {SEL.push(i);btn.classList.add('sel');}
  } else { if(!_checkRecTags()) return; send([i]); }
}
function confirmMulti(){
  const min=STATE.multi?.min??0, max=STATE.multi?.max??999;
  if(SEL.length<min||SEL.length>max){alert(`${min}〜${max}個を選んでください`);return;}
  if(!_checkRecTags()) return;
  send(SEL.slice());
}
function detailLive(el){
  detail(+el.dataset.id, {hp:el.dataset.hp, mhp:el.dataset.mhp, e:el.dataset.e, tools:el.dataset.tools});
}
function detail(id, live){
  const d=DB[id]; if(!d) return;
  const url=imgURL(id);
  let h=`<div class="detail-top">${url?`<img src="${url}" onerror="this.style.display='none'">`:''}<div style="flex:1">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <h2 style="margin:0;font-size:20px">${d.name_tc||d.name}</h2>
      <span class="type-badge" style="background:${tColor(d.type)}">${TC[d.type]||d.type||''}</span></div>
    <div class="hint" style="margin:3px 0">${d.name}</div>`;
  if(d.hp) h+=`<div class="detail-row"><span class="label">HP</span><span>${d.hp}</span></div>`;
  if(d.weak) h+=`<div class="detail-row"><span class="label">弱点</span><span>${TC[d.weak]||d.weak}</span></div>`;
  if(d.stage!=null) h+=`<div class="detail-row"><span class="label">進化段階</span><span>${d.ex?'ex ':''}${['たね','1進化','2進化'][d.stage]??d.stage}</span></div>`;
  h+='</div></div>';
  if(live) h+=`<div class="atk" style="border:1px solid var(--gold)"><div class="nm">📍 場の状態</div>
    <div class="tx">HP ${live.hp}/${live.mhp}　·　🔋 エネルギー ${live.e} 個　·　🛡 どうぐ:${live.tools||'無'}</div></div>`;
  (d.abilities||[]).forEach(a=>h+=`<div class="atk"><div class="nm">✨ 特性(アビリティ)</div><div class="tx">${a}</div></div>`);
  (d.attacks||[]).forEach(a=>{
    const cost=(a.cost||[]).map(c=>TC[c]||c[0]).join('');
    h+=`<div class="atk"><div class="nm"><span>⚔ ${a.name} <span class="hint">[${cost}]</span></span><span>${a.dmg||''}</span></div>
      ${a.text?`<div class="tx">${a.text}</div>`:''}</div>`;
  });
  $('#modalBody').innerHTML=h; $('#modal').classList.add('show');
}
function setPile(side,o){
  const dk=document.querySelector(`#${side}-deck b`), ds=document.querySelector(`#${side}-discard b`);
  if(dk) dk.textContent=o.deck; if(ds) ds.textContent=(o.discard!=null?o.discard:'–');
}
function anchorEl(side,name){
  if(name==='hand') return side==='me'?$('#hand'):$('#oppStats');
  if(name==='active') return side==='me'?$('#meActive'):$('#oppActive');
  if(name==='bench'||name==='field') return side==='me'?$('#meBench'):$('#oppBench');
  return document.getElementById(`${side}-${name}`);   // deck / discard piles
}
function flyCard(side,frm,to,cardId){
  const a=anchorEl(side,frm), b=anchorEl(side,to);
  if(!a||!b) return;
  const ra=a.getBoundingClientRect(), rb=b.getBoundingClientRect();
  if(!ra.width||!rb.width) return;
  const el=document.createElement('div'); el.className='fly';
  const url=imgURL(cardId);
  el.innerHTML=url?`<img src="${url}">`:`<div class="fl">🂠</div>`;
  el.style.left=(ra.left+ra.width/2-28)+'px'; el.style.top=(ra.top+ra.height/2-39)+'px';
  document.body.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.left=(rb.left+rb.width/2-28)+'px'; el.style.top=(rb.top+rb.height/2-39)+'px';
    el.style.opacity='.25'; el.style.transform='scale(.5)';
  }));
  setTimeout(()=>el.remove(),650);
}
function showReveal(cardId,label){
  const url=imgURL(cardId); if(!url) return;   // only reveal cards we have art for
  const r=$('#reveal');
  r.innerHTML=`<img src="${url}"><div class="rl">${label}</div>`;
  r.classList.add('show');
  clearTimeout(showReveal._t); showReveal._t=setTimeout(()=>r.classList.remove('show'),1100);
}
function logLine(e){
  const div=document.createElement('div');
  div.className='log-entry '+(e.hd?'hd':(e.side||''));
  div.textContent=e.txt;
  return div;
}
function animateEntry(e){
  if(e.frm && e.to) flyCard(e.side,e.frm,e.to,e.reveal);
  else if(e.frm==='hand') flyCard(e.side,'hand','discard',e.reveal);
  else if(e.frm) flyCard(e.side,e.frm,'discard',e.reveal);
  if(e.reveal) showReveal(e.reveal,e.txt);
}
function processLog(log){
  const box=$('#logbox'); box.innerHTML='';
  log.forEach(e=>box.appendChild(logLine(e)));
  box.scrollTop=box.scrollHeight;
  const fresh=log.filter(e=>e.seq>LASTSEQ);
  if(log.length) LASTSEQ=Math.max(LASTSEQ,...log.map(e=>e.seq||0));
  fresh.slice(-12).forEach((e,k)=>setTimeout(()=>animateEntry(e), k*130));   // stagger, cap burst
}
async function send(indices){
  const payload={indices,recording:REC};
  if(REC){
    payload.turn_goal=TURN_GOAL||'';
    payload.win_plan_tags=[...WIN_PLAN];
    payload.risk_flags=[...RISKS];
    payload.human_reason_tags=[...REASONS];
    payload.human_considered=[...CONSIDERED];
    TURN_GOAL=''; WIN_PLAN=new Set(); RISKS=new Set();
    REASONS=new Set(); CONSIDERED=new Set();
  }
  const r=await fetch('/select',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  render(await r.json());
}
function toggleRec(){
  REC=!REC;
  const b=$('#recBtn');
  b.textContent=REC?'⏺ 記録ON':'⏺ 記録OFF';
  b.style.background=REC?'var(--accent2)':'';
  b.style.color=REC?'#fff':'';
  const show=REC && STATE && STATE.yourTurn && !STATE.over;
  renderThoughtPanel(show);
}
async function newGame(){ LASTSEQ=-1; $('#logbox').innerHTML=''; const r=await fetch('/new?me='+$('#me').value+'&opp='+$('#opp').value+'&rec='+(REC?1:0)); render(await r.json()); }
async function loadDecks(){
  const decks=await (await fetch('/decks')).json();
  const opts=decks.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
  $('#me').innerHTML=opts; $('#opp').innerHTML=opts;
  $('#me').value='megastarmie'; $('#opp').value='dragapult';
}
(async()=>{
  DB=await (await fetch('/card_db.json')).json();
  try{ IMG=await (await fetch('/card_images.json')).json(); }catch(e){ IMG={}; }
  await loadDecks();
  newGame();
})();
</script>
</body>
</html>
